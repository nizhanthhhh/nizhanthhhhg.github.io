// Combine all units
const UNITS = [UNIT1, UNIT2, UNIT3];
const UNIT_NAMES = ["Unit 1 – Introduction to Life Skills, Time Management, Health & Addictions", "Unit 2 – Hobbies, Habits, Peer Pressure & Stress Management", "Unit 3 – Continuous Learning & Teamwork"];

// App state
let currentUnit = -1;
let currentIndex = 0;
let answers = UNITS.map(unit => Array(unit.length).fill(null));

// Helper functions
function toggleDark() {
  document.body.classList.toggle('dark');
  const btn = document.querySelector('button[onclick="toggleDark()"]');
  btn.textContent = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
}

function updateTotalCounts() {
  for (let i = 0; i < UNITS.length; i++) {
    document.getElementById(`t${i}`).innerText = UNITS[i].length;
  }
}

function updateScores() {
  for (let u = 0; u < UNITS.length; u++) {
    let correct = 0;
    let answered = 0;
    for (let i = 0; i < UNITS[u].length; i++) {
      if (answers[u][i] !== null) {
        answered++;
        if (answers[u][i].correct) correct++;
      }
    }
    document.getElementById(`s${u}`).innerHTML = `${correct} / ${answered}`;
  }
}

function resetUnit() {
  if (currentUnit < 0) return;
  answers[currentUnit] = Array(UNITS[currentUnit].length).fill(null);
  currentIndex = 0;
  updateScores();
  renderQuestion();
}

function switchUnit(unitIdx) {
  currentUnit = unitIdx;
  currentIndex = 0;
  document.querySelectorAll('.unit-btn').forEach((btn, i) => {
    if (i === unitIdx) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('q-area');
  if (currentUnit < 0) {
    area.innerHTML = '<p class="placeholder">👆 Select a unit to begin practicing ALL MCQs.</p>';
    return;
  }

  const questions = UNITS[currentUnit];
  const q = questions[currentIndex];
  const existing = answers[currentUnit][currentIndex];
  const total = questions.length;
  const answeredCount = answers[currentUnit].filter(a => a !== null).length;
  const progressPercent = ((currentIndex + 1) / total) * 100;

  // Build navigation dots
  let dotsHtml = '';
  for (let i = 0; i < total; i++) {
    const ans = answers[currentUnit][i];
    let cls = 'q-nav-dot';
    if (i === currentIndex) cls += ' current';
    else if (ans) cls += ans.correct ? ' done-c' : ' done-w';
    dotsHtml += `<div class="${cls}" onclick="goToQuestion(${i})">${i+1}</div>`;
  }

  // Build options
  let optionsHtml = '';
  const letters = ['A', 'B', 'C', 'D'];
  for (let i = 0; i < q.o.length; i++) {
    let optClass = 'opt';
    if (existing !== null) {
      if (i === q.a) optClass += ' correct';
      else if (i === existing.chosen && !existing.correct) optClass += ' wrong';
    }
    optionsHtml += `
      <button class="${optClass}" onclick="pickAnswer(${i})" ${existing !== null ? 'disabled' : ''}>
        <span class="opt-letter">${letters[i]}</span>
        <span>${escapeHtml(q.o[i])}</span>
      </button>
    `;
  }

  // Feedback
  let feedbackHtml = '';
  if (existing !== null) {
    if (existing.correct) {
      feedbackHtml = `<div class="feedback correct show">✓ Correct!</div>`;
    } else {
      feedbackHtml = `<div class="feedback wrong show">✗ Incorrect — Correct answer: ${letters[q.a]}. ${escapeHtml(q.o[q.a])}</div>`;
    }
  }

  const html = `
    <div class="progress-row">
      <span>${UNIT_NAMES[currentUnit]}</span>
      <span>Q ${currentIndex+1} / ${total} &nbsp;·&nbsp; ${answeredCount} answered</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progressPercent}%"></div></div>
    <div class="q-nav">${dotsHtml}</div>
    <div class="q-number">Question ${currentIndex + 1}</div>
    <div class="q-text">${escapeHtml(q.q)}</div>
    <div class="options">${optionsHtml}</div>
    ${feedbackHtml}
    <div class="nav-row">
      <button onclick="navigate(-1)" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
      <button onclick="navigate(1)" class="nav-btn-primary" ${currentIndex === total-1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
  area.innerHTML = html;
}

function pickAnswer(selectedIdx) {
  if (currentUnit < 0) return;
  if (answers[currentUnit][currentIndex] !== null) return;
  const q = UNITS[currentUnit][currentIndex];
  const isCorrect = (selectedIdx === q.a);
  answers[currentUnit][currentIndex] = { chosen: selectedIdx, correct: isCorrect };
  updateScores();
  renderQuestion();
}

function navigate(delta) {
  if (currentUnit < 0) return;
  const newIdx = currentIndex + delta;
  if (newIdx >= 0 && newIdx < UNITS[currentUnit].length) {
    currentIndex = newIdx;
    renderQuestion();
  }
}

function goToQuestion(idx) {
  if (currentUnit < 0) return;
  if (idx >= 0 && idx < UNITS[currentUnit].length) {
    currentIndex = idx;
    renderQuestion();
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Initialize
updateTotalCounts();
updateScores();
